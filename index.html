<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">SISTEMA</div>
            <nav>
                <ul>
                    <li>Resumos</li>
                    <li class="active">Vendas</li>
                    <li>Processos</li>
                    <li>Documentos</li>
                    <li>Relatórios</li>
                    <li>Configurações</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="container-vendas">
                <h1>Gestão de Vendas</h1>
                
                <div class="form-cadastro">
                    <div class="input-group">
                        <label>Vendedor</label>
                        <input type="text" id="vendedor" placeholder="Nome do consultor">
                    </div>
                    <div class="input-group">
                        <label>Valor da Venda</label>
                        <input type="number" id="valorVenda" placeholder="R$ 0,00" step="0.01">
                    </div>
                    <button class="btn-cadastrar" onclick="cadastrarVenda()">Confirmar Venda</button>
                </div>

                <div class="table-card">
                    <div class="table-header">
                        <h2>Lista de Vendas</h2>
                        <div class="button-actions">
                            <button class="btn-remover-ultimo" onclick="removerUltimo()">Remover Último</button>
                            <button class="btn-limpar-tudo" onclick="limparTudo()">Limpar Tudo</button>
                        </div>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Vendedor</th>
                                <th>Valor Bruto</th>
                                <th>Desconto</th>
                                <th>Valor Líquido</th>
                                <th>Data/Hora</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
